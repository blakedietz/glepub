name = "glepub"
version = "0.2.0"
description = "An EPUB toolkit for the Erlang and JavaScript targets, built on glexml"
licences = ["Apache-2.0"]
repository = { type = "github", user = "blakedietz", repo = "glepub" }

[dependencies]
gleam_stdlib = ">= 1.0.0 and < 2.0.0"
# A path dependency for co-development; the release workflow swaps it for
# the published Hex version before running `gleam publish`.
glexml = { path = "../glexml" }

[dev_dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
